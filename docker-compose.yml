version: '3.9'

services:
  # 1. БАЗА ДАННЫХ (Твоя настройка)
  postgres:
    image: postgres:16-alpine
    container_name: investment_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: investment_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - investment_network

  # 2. REDIS (Твоя настройка)
  redis:
    image: redis:7-alpine
    container_name: investment_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - investment_network

  # 3. БЭКЕНД (Новое!)
  backend:
    build: ./backend
    container_name: investment_backend
    command: sh -c "alembic upgrade head && python -m app.utils.seed_data && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - investment_network

  frontend:
    build: ./frontend
    container_name: investment_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - investment_network

  # 5. ИНСТРУМЕНТЫ (Твои настройки)
  adminer:
    image: adminer:latest
    container_name: investment_adminer
    ports:
      - "8090:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    networks:
      - investment_network

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: investment_redis_commander
    ports:
      - "8091:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379
    depends_on:
      - redis
    networks:
      - investment_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: investment_pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: user@domain.com
      PGADMIN_DEFAULT_PASSWORD: SuperSecret
    depends_on:
      - postgres
    networks:
      - investment_network

volumes:
  postgres_data:
  redis_data:

networks:
  investment_network:
    driver: bridge